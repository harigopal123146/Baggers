<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>All Users Records</title>

    <!-- ✅ Correct Bootstrap Version -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- AngularJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/angular.js/1.8.3/angular.min.js"></script>

    <script>
        var module = angular.module("usersModule", []);
        module.controller("usersController", function ($scope, $http) {

            $scope.jsonAry = [];

            $scope.doFetchUsers = function () {
                $http.get("/angular-fetchUsers").then(function (result) {
                    $scope.jsonAry = result.data;
                }, function (err) {
                    alert(err);
                });
            }

            $scope.doBlock = function (emailid) {
                $http.get("/angular-userBlock?emailid=" + emailid).then(function (result) {
                    alert(result.data);
                }, function (err) {
                    alert(err);
                });
            }

            $scope.doResume = function (emailid) {
                $http.get("/angular-userResume?emailid=" + emailid).then(function (result) {
                    alert(result.data);
                }, function (err) {
                    alert(err);
                });
            }

        });
    </script>
    <style>

            /* Background */
            body {
            background: linear-gradient(to right, #eef2f3, #dfe9f3);
            font-family: 'Segoe UI', sans-serif;
            }

            /* Header */
            .card-header {
            background: linear-gradient(135deg, #36d1dc, #5b86e5) !important;
            font-weight: 600;
            letter-spacing: 1px;
            }

            /* Buttons */
            .btn-success {
            background: linear-gradient(135deg, #00c853, #64dd17);
            border: none;
            font-weight: 600;
            }

            .btn-danger {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            border: none;
            }

            .btn-warning {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            border: none;
            color: black;
            }

            /* Hover effects */
            button {
            transition: 0.3s;
            }

            button:hover {
            transform: scale(1.05);
            }

            /* Table */
            .table {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            }

            .table-dark {
            background: linear-gradient(135deg, #232526, #414345) !important;
            }

            .table tbody tr:hover {
            background-color: #f1f1f1;
            transform: scale(1.01);
            }

        </style>
</head>

<body ng-app="usersModule" ng-controller="usersController" class="bg-light">

<div class="container mt-4">

    <!-- Header Card -->
    <div class="card shadow mb-3">
        <div class="card-header bg-primary text-white text-center">
            <h3 class="mb-0">All Users Records</h3>
        </div>
    </div>

    <!-- Fetch Button -->
    <div class="text-center mb-3">
        <button class="btn btn-success" ng-click="doFetchUsers()">
            Fetch All Users Record
        </button>
    </div>

    <!-- Users Table -->
    <div class="table-responsive">
        <table class="table table-bordered table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Sr.No</th>
                    <th>Email id</th>
                    <th>User Type</th>
                    <th>Date of Join</th>
                    <th>Status</th>
                    <th>Operations</th>
                </tr>
            </thead>

            <tbody>
                <tr ng-repeat="obj in jsonAry">
                    <td>{{$index+1}}</td>
                    <td>{{obj.emailid}}</td>
                    <td>{{obj.utype}}</td>
                    <td>{{obj.dob | date:'yyyy-MM-dd'}}</td>
                    <td>{{obj.Status}}</td>
                    <td>
                        <button class="btn btn-danger btn-sm me-2"
                                ng-click="doBlock(obj.emailid)">
                            Block
                        </button>
                        <button class="btn btn-warning btn-sm"
                                ng-click="doResume(obj.emailid)">
                            Resume
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
