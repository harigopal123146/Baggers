<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>All Citizens</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
      
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

      <script src="https://cdnjs.cloudflare.com/ajax/libs/angular.js/1.8.3/angular.min.js"></script>

 <script>
        var module=angular.module("usersModule",[]);
        module.controller("usersController",function($scope,$http)
        {
            $scope.jsonAry=[];
            $scope.doFetchCitizen=function()
                {
                    $http.get("/angular-fetchCitizen").then(allGood,errKuch)
                    function allGood(result)
                        {
                            // alert(JSON.stringify(result.data));
                            $scope.jsonAry=result.data;
                        }

                    function errKuch(err)
                        {
                            alert(err);
                        }
                      }
        })
  </script>

    <style>

          /* Background */
          body {
            background: linear-gradient(to right, #eef2f3, #dfe9f3);
            font-family: 'Segoe UI', sans-serif;
          }

          /* Header */
          .card-header {
            background: linear-gradient(135deg, #ff512f, #dd2476) !important;
            font-weight: 600;
            letter-spacing: 1px;
          }

          /* Button */
          .btn-success {
            background: linear-gradient(135deg, #00c853, #64dd17);
            border: none;
            font-weight: 600;
            padding: 10px 20px;
            transition: 0.3s;
          }

          .btn-success:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #64dd17, #00c853);
          }

          /* Table */
          .table {
            border-radius: 10px;
            overflow: hidden;
            background: white;
          }

          /* Header row */
          .table-dark {
            background: linear-gradient(135deg, #232526, #414345) !important;
          }

          /* Row hover */
          .table tbody tr {
            transition: 0.2s;
          }

          .table tbody tr:hover {
            background-color: #f1f1f1;
            transform: scale(1.01);
          }

          /* Container spacing */
          .container {
            margin-top: 20px;
          }

</style>

  </head>
<body ng-app="usersModule" ng-controller="usersController">
  <div class="row">
    <div class="col-md-12">
       <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h3>All Citizen Records</h3>
            </div>
       </div>
    </div>
 </div>

 <div class="row mt-3">
   <div class="col-md-12 text-center" >
    <button class="btn btn-success mb-4" ng-click="doFetchCitizen()"> Fetch All Citizen Record</button>
   </div>
 </div>

 <div class="container">
   <div class="table-responsive">
                    <table class="table table-bordered table-striped table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>Sr.No</th>
                                <th>Email id</th>
                                <th>Mobile No</th>
                                <th>Name</th>
                                <th>Aadhar Card No.</th>
                                <th>Father's Name</th>
                                <th>Dob</th>
                                <th>Gender</th>
                                <th>Address</th>
                                <th>City</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr ng-repeat="obj in jsonAry">
                                <td>{{$index+1}}</td>
                                <td>{{obj.emailid}}</td>
                                <td>{{obj.mobile}}</td>
                                <td>{{obj.namee}}</td>
                                <td>{{obj.aadharno}}</td>
                                <td>{{obj.fathername}}</td>
                                 <td>{{obj.dob | date:'yyyy-MM-dd'}}</td>
                                <td>{{obj.gender}}</td>
                                <td>{{obj.address}}</td>
                                <td>{{obj.city}}</td>
                            </tr>
                        </tbody>
                    </table>
    </div>
  </div>

</body>
</html>
