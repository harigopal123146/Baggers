<!DOCTYPE html>
<html lang="en">
<head>
    <title>All Volunteer Records</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- ✅ Bootstrap 5.3.2 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- AngularJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/angular.js/1.8.3/angular.min.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        var module = angular.module("usersModule", []);
        module.controller("usersController", function ($scope, $http) {

            $scope.jsonAry = [];

            $scope.doFetchVol = function () {
                $http.get("/angular-fetchVolunteer").then(function (result) {
                    $scope.jsonAry = result.data;
                }, function (err) {
                    alert(err);
                });
            }

        });
    </script>
    <style>

        /* Background */
        body {
        background: linear-gradient(to right, #eef2f3, #dfe9f3);
        font-family: 'Segoe UI', sans-serif;
        }

        /* Header */
        .card-header {
        background: linear-gradient(135deg, #667eea, #764ba2) !important;
        font-weight: 600;
        letter-spacing: 1px;
        }

        /* Button */
        .btn-success {
        background: linear-gradient(135deg, #00c853, #64dd17);
        border: none;
        font-weight: 600;
        transition: 0.3s;
        }

        .btn-success:hover {
        transform: scale(1.05);
        }

        /* Table */
        .table {
        background: white;
        border-radius: 10px;
        overflow: hidden;
        }

        .table-dark {
        background: linear-gradient(135deg, #232526, #414345) !important;
        }

        /* Row hover */
        .table tbody tr {
        transition: 0.2s;
        }

        .table tbody tr:hover {
        background-color: #f1f1f1;
        transform: scale(1.01);
        }

        /* Badge styling */
        .badge {
        padding: 6px 10px;
        font-size: 12px;
        }

    </style>
</head>

<body ng-app="usersModule" ng-controller="usersController" class="bg-light">

<div class="container mt-4">
    <!-- Header Card -->
    <div class="card shadow mb-3">
        <div class="card-header bg-primary text-white text-center">
            <h3 class="mb-0">All Volunteer Records</h3>
        </div>
    </div>

    <!-- Fetch Button -->
    <div class="text-center mb-3">
        <button class="btn btn-success" ng-click="doFetchVol()">
            Fetch All Volunteer Record
        </button>
    </div>

    <!-- Table -->
    <div class="table-responsive">
        <table class="table table-bordered table-striped table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>Sr.No</th>
                    <th>Email id</th>
                    <th>Name</th>
                    <th>Contact</th>
                    <th>Address</th>
                    <th>City</th>
                    <th>Gender</th>
                    <th>Occupation</th>
                    <th>Volunteer Type</th>
                    <th>Ngo Reg.No</th>
                </tr>
            </thead>

            <tbody>
                <tr ng-repeat="obj in jsonAry">
                    <td>{{$index+1}}</td>
                    <td>{{obj.emailid}}</td>
                    <td>{{obj.name}}</td>
                    <td>{{obj.contact}}</td>
                    <td>{{obj.address}}</td>
                    <td>{{obj.city}}</td>
                    <td>
                        <span class="badge bg-info text-dark">
                            {{obj.gender}}
                        </span>
                    </td>
                    <td>{{obj.occupation}}</td>
                    <td>{{obj.volType}}</td>
                    <td>{{obj.volNgoNo}}</td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
