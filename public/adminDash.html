<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin DashBoard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script> 
    <script>
       $(document).ready(function(){
                  $("#lbtn").click(function(){
                        localStorage.removeItem("activeuser");
                        location.href="index.html";
                  }) 
         })
    </script>
<style>

    /* Background */
    body {
      background: linear-gradient(to right, #eef2f3, #dfe9f3);
      font-family: 'Segoe UI', sans-serif;
    }

    /* Header */
    .bg-danger {
      background: linear-gradient(135deg, #ff512f, #dd2476) !important;
      padding: 15px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    /* Cards */
    .card {
      border: none;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
      overflow: hidden;
    }

    /* Hover effect */
    .card:hover {
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    }

    /* Card images */
    .card img {
      border-radius: 12px;
      object-fit: cover;
      transition: 0.3s;
    }

    .card:hover img {
      transform: scale(1.08);
    }

    /* Buttons */
    .btn-info {
      width: 100%;
      border-radius: 8px;
      font-weight: 600;
      border: none;
      color: white;
      background: linear-gradient(135deg, #36d1dc, #5b86e5);
      transition: 0.3s;
    }

    /* Button hover */
    .btn-info:hover {
      transform: scale(1.05);
      background: linear-gradient(135deg, #5b86e5, #36d1dc);
    }

    /* Spacing */
    .container {
      margin-top: 20px;
    }

    .row {
      margin-bottom: 15px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .card {
        margin-bottom: 20px;
      }
    }
</style>

</head>
<body>
<form action="/adminDash">
    <div class="row mt-2">
      <div class="col-md-12 fs-2 text-center bg-danger text-white">
        Admin Dashboard
      </div>
    </div>

    <div class="container">
       <div class="row mt-3">
        <div class="col-md-4">
          <div class="card " >
              <img src="/pics/admin-manager.jpg" class="card-img-top mt-3" alt="User Manager" style="width: 200px; height: 180px; margin:auto">
              <div class="card-body text-center ">
                 <a href="/UserManager" id="btnUsers" name="btnUsers" class="btn btn-info">Users Manager</a>
              </div>
           </div>
        </div>

        <div class="col-md-4">
           <div class="card " >
              <img src="/pics/volunteers.png" class="card-img-top mt-3" alt="Volunteers" style="width: 200px; height: 180px; margin:auto">
              <div class="card-body text-center ">
               <a href="/Volunteer" id="btnVolunteer" name="btnVolunteer" class="btn btn-info">Volunteers</a>
              </div>
           </div>
        </div>

        <div class="col-md-4">
           <div class="card " >
            <img src="/pics/citizens.png" class="card-img-top mt-3" alt="Citizen" style="width: 200px; height: 180px; margin:auto">
            <div class="card-body text-center ">
             <a href="all-Citizens.html" id="btnCitizens" name="btnCitizens" class="btn btn-info">Citizens</a>
            </div>
           </div>
        </div>
       </div>
       
       <div class="row mt-4">
        <div class="col-md-4">
          <div class="card " >
            <img src="/pics/Bagger.jpg" class="card-img-top mt-3" alt="Baggers" style="width: 200px; height: 180px; margin:auto">
            <div class="card-body text-center ">
              <a href="/Baggers" id="btnBaggers" name="btnBaggers" class="btn btn-info">Baggers</a>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card " >
            <img src="/pics/logout.jpg" class="card-img-top mt-3" alt="Baggers" style="width: 200px; height: 180px; margin:auto">
            <div class="card-body text-center ">
               <button type="button" id="lbtn" class="btn btn-info" >Logout</button>
            </div>
          </div>
        </div>

       </div>
    </div>
</form>

</body>
</html>
