<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DashBoard Volunteer NGO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

      <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>  
       <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
     <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>  
     
    <script>
        $(document).ready(function(){
                  let user = localStorage.getItem("activeuser");
                  $("#DashEmail").val(user);

                  // 👇 Show email on dashboard
                  $("#welcomeUser").html("Welcome: " + user);
                  //==========================
                  $("#lbtn").click(function(){
                        localStorage.removeItem("activeuser");
                        location.href="index.html";
                  }) 
         })

    </script>
    
    <style>

        /* Background */
        body {
          background: linear-gradient(to right, #eef2f3, #dfe9f3);
          font-family: 'Segoe UI', sans-serif;
        }

        /* Navbar */
        .navbar {
          box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .navbar-brand {
          font-weight: 600;
          font-size: 18px;
        }

        /* Header */
        .bg-danger {
          background: linear-gradient(135deg, #ff512f, #dd2476) !important;
          padding: 15px;
          font-weight: 600;
          letter-spacing: 1px;
        }

        /* Cards */
        .card {
          border: none;
          border-radius: 15px;
          box-shadow: 0 10px 25px rgba(0,0,0,0.1);
          transition: all 0.3s ease;
          overflow: hidden;
        }

        .card:hover {
          transform: translateY(-8px) scale(1.02);
        }

        /* Card Images */
        .card img {
          border-radius: 12px;
          object-fit: cover;
          transition: 0.3s;
        }

        .card:hover img {
          transform: scale(1.05);
        }

        /* Buttons */
        .btn-primary {
          width: 100%;
          border-radius: 8px;
          font-weight: 600;
          background: linear-gradient(135deg, #36d1dc, #5b86e5);
          border: none;
          transition: 0.3s;
        }

        .btn-primary:hover {
          transform: scale(1.05);
          background: linear-gradient(135deg, #5b86e5, #36d1dc);
        }

        /* Container spacing */
        .container {
          margin-top: 20px;
        }

        /* Row spacing */
        .row {
          margin-bottom: 15px;
        }

        /* Responsive */
        @media (max-width: 768px) {
          .card {
            margin-bottom: 20px;
          }
        }

</style>

<body>
<form action="/citizen-dashboard" method="post" enctype="multipart/form-data">
 <nav class="navbar bg-body-tertiary">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">
        <img src="/pics/Bagger.jpg" width="40" height="40">
        <b>Bagger Free Society</b>
      </a>

      <!-- 👇 Add this -->
      <span class="fw-bold text-primary" id="welcomeUser"></span>
    </div>
  </nav>    

<div class="row mt-2">
  <div class="col-md-12 fs-2 text-center bg-danger text-white">
    Citizen Dashboard
  </div>
</div>

<div class="container mt-3">
  <div class="row mt-2">
    <div class="col-md-4">
      <div class="card " >
        <img src="/pics/profile pic.png" class="card-img-top mt-3" alt="Profile" style="width: 200px; height: 200px; margin:auto">
        <div class="card-body text-center ">
          <a href="profileCitizen.html" class="btn btn-primary fs-4">Profile</a>
        </div>
      </div>
    </div>

     <div class="col-md-4">
      <div class="card" >
        <img src="/pics/findworker.jpg" class="card-img-top mt-3" alt="baggers-Details" style="width: 200px; height: 200px; margin:auto">
        <div class="card-body text-center ">
            <a href="find-Worker.html" class="btn btn-primary fs-4">Find Worker</a>
        </div>
      </div>
    </div>

     <div class="col-md-4">
      <div class="card" >
        <img src="/pics/logout.jpg" class="card-img-top mt-3" alt="settings" style="width: 200px; height: 200px; margin:auto">
        <div class="card-body text-center ">
        <button type="button" id="lbtn" class="btn btn-primary fs-4" >Logout</button>
        </div>
      </div>
    </div>

  </div>
</div>

</form>
</body>
</html>
