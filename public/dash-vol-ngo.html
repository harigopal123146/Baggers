<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DashBoard Volunteer NGO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

      <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>  
       <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
       <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
$(document).ready(function(){

   // Email Write
    let user = localStorage.getItem("activeuser");
    $("#DashEmail").val(user);

    // 👇 Show email on dashboard
    $("#welcomeUser").html("Welcome: " + user);
    
    //===============================
    // Toggle password visibility
    $(".fa-solid").click(function(){
        let inputField = $(this).prev("input");

        if(inputField.prop("type") === "password"){
            inputField.prop("type","text");
            $(this).removeClass("fa-eye").addClass("fa-eye-slash");
        } else {
            inputField.prop("type","password");
            $(this).removeClass("fa-eye-slash").addClass("fa-eye");
        }
    });

    // Change password
    $("#btnPwdChange").click(function(){

        let obj = {
            type: "POST",
            url: "/setting",
            data: {
                DashEmail: $("#DashEmail").val().trim(),
                DashOldPwd: $("#DashOldPwd").val().trim(),
                DashNewPwd: $("#DashNewPwd").val().trim()
            }
        };

        $.ajax(obj)
        .then(function(resp){
            alert(resp);
        })
        .fail(function(err){
            alert(err.responseText || "Error occurred");
        });
    });

//  logout =============================//

  $("#lbtn").click(function(){
        localStorage.removeItem("activeuser");
        location.href="index.html";
  }) 


});
</script>
   
    <style> 
          .ok{
            color: green; border: 1px green solid; border-radius: 10px;text-align: center; padding: 2px ; width: 50px;
            margin-top: 2px;
          }
          .not-ok{
              color: red; border: 1px red solid; border-radius: 10px;text-align: center; padding: 2px ; width: 50px;
              margin-top: 2px;
          }
          /* Page Background */
          body {
            background: linear-gradient(to right, #eef2f3, #dfe9f3);
            font-family: 'Segoe UI', sans-serif;
          }

          /* Navbar */
          .navbar {
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
          }

          .navbar-brand b {
            font-size: 20px;
            color: #333;
          }

          /* Header */
          .bg-danger {
            background: linear-gradient(135deg, #ff512f, #dd2476) !important;
            padding: 15px;
            font-weight: 600;
            letter-spacing: 1px;
          }

          /* Cards */
          .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            overflow: hidden;
          }

          .card:hover {
            transform: translateY(-8px) scale(1.02);
          }

          /* Card Images */
          .card img {
            border-radius: 10px;
            object-fit: cover;
            transition: 0.3s;
          }

          .card:hover img {
            transform: scale(1.05);
          }

          /* Card Buttons */
          .card .btn {
            border-radius: 8px;
            font-weight: 600;
            width: 100%;
            background: linear-gradient(135deg, #36d1dc, #5b86e5);
            border: none;
            transition: 0.3s;
          }

          .card .btn:hover {
            background: linear-gradient(135deg, #5b86e5, #36d1dc);
            transform: scale(1.05);
          }

          /* Modal */
          .modal-content {
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
          }

          .modal-header {
            background: linear-gradient(135deg, #ff512f, #dd2476);
            border-radius: 15px 15px 0 0;
          }

          /* Inputs */
          .form-control {
            border-radius: 8px;
            border: 1px solid #ddd;
            transition: 0.3s;
          }

          .form-control:focus {
            border-color: #dd2476;
            box-shadow: 0 0 5px rgba(221, 36, 118, 0.4);
          }

          /* Password Eye Icon */
          .fa-eye, .fa-eye-slash {
            position: absolute;
            right: 15px;
            margin-top: -30px;
            cursor: pointer;
            color: #666;
          }

          /* Button */
          .btn-primary {
            border-radius: 8px;
            padding: 8px 20px;
            font-weight: 600;
            background: linear-gradient(135deg, #36d1dc, #5b86e5);
            border: none;
            transition: 0.3s;
          }

          .btn-primary:hover {
            transform: scale(1.05);
          }

          /* Utility */
          .container {
            margin-top: 20px;
          }

          /* Responsive */
          @media (max-width: 768px) {
            .card {
              margin-bottom: 20px;
            }
          }

      </style>
  </head>
<body>

<form action="/dasdboard">
  <nav class="navbar bg-body-tertiary">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">
        <img src="/pics/Aidoralogo.png" width="40" height="40">
        <b>Aidora</b>
      </a>

      <!-- 👇 Add this -->
      <span class="fw-bold text-primary" id="welcomeUser"></span>
    </div>
  </nav>

<div class="row mt-2">
  <div class="col-md-12 fs-2 text-center bg-danger text-white">
    NGO Volunteer Dashboard
  </div>
</div>

<div class="container mt-3">
  <div class="row mt-2">
    <div class="col-md-4">
      <div class="card" >
        <img src="/pics/profile pic.png" class="card-img-top mt-3" alt="Profile" style="width: 200px; height: 200px; margin:auto">
        <div class="card-body text-center ">
          <a href="profileVol.html" class="btn btn-primary fs-4">Profile</a>
    
        </div>
      </div>
    </div>

     <div class="col-md-4">
      <div class="card" >
        <img src="/pics/bagger-details.jpg" class="card-img-top mt-3" alt="baggers-Details" style="width: 200px; height: 200px; margin:auto">
        <div class="card-body text-center ">
          <a href="details-bagger.html" class="btn btn-primary fs-4">Post Beggar-Details</a>
        </div>
      </div>
    </div>

     <div class="col-md-4">
      <div class="card" >
        <img src="/pics/bagger-manager.jpg" class="card-img-top mt-3" alt="Bagger-Manager" style="width: 200px; height: 200px; margin:auto">
        <div class="card-body text-center ">
            <a href="Bagger-Manager.html" class="btn btn-primary fs-4">Bagger Manager</a>
        </div>
      </div>
    </div>

  </div>

  <div class="row mt-2">
    <div class="col-md-4">
      <div class="card" >
        <img src="/pics/setting.jpg" class="card-img-top mt-3" alt="settings" style="width: 200px; height: 200px; margin:auto">
        <div class="card-body text-center ">
         <button type="button" class="btn btn-primary fs-4" data-bs-toggle="modal" data-bs-target="#changePwd">Settings</button>
        </div>
      </div>
    </div>

    <div class="col-md-4">  
      <div class="card" >
        <img src="/pics/logout.jpg" class="card-img-top mt-3" alt="settings" style="width: 200px; height: 200px; margin:auto">
        <div class="card-body text-center ">
         <button type="button" id="lbtn"  class="btn btn-primary fs-4" >Logout</button>
        </div>
      </div>
    </div>
  </div>
</div>

</form>
<!-- MODAL -->
<div class="modal" id="changePwd" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-danger">
        <h5 class="modal-title text-white ">Change Password</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
          <form action="/setting" method="post">
                <div class="mb-3">
                      <label for="DashEmail" class="form-label">Email ID</label>
                      <input type="email" class="form-control" id="DashEmail" name="DashEmail" aria-describedby="emailHelp">
                </div>

                <div class="mb-3">
                  <label for="DashOldPwd" class="form-label "  >Old Password</label>
                  <input type="password" class="form-control" id="DashOldPwd" name="DashOldPwd">
                  <i class="fa-solid fa-eye fa-bounce"></i>
                </div>

                <div class="mb-3">
                  <label for="DashNewPwd" class="form-label "  >New Password</label>
                  <input type="password" class="form-control" id="DashNewPwd" name="DashNewPwd">
                  <i class="fa-solid fa-eye fa-bounce"></i>
                </div>
              
              <div class="text-center">
                        <button type="button" id="btnPwdChange" class="btn btn-primary" >Change Password</button>      <!--using ajax-->
              </div>
          </form>
      </div>
    </div>
  </div>
</div>
</body>
</html>
